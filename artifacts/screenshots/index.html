<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phingo UI Screenshots</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; background: #f4f9ff; color: #1a2b48; }
    h1 { font-size: 1.5rem; margin: 0 0 8px; }
    p { margin: 0 0 24px; color: #64748b; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    figure { margin: 0; background: #fff; border-radius: 16px; padding: 12px; box-shadow: 0 8px 24px rgba(26,43,72,.08); }
    figcaption { font-weight: 700; margin-bottom: 10px; font-size: 14px; }
    img { width: 100%; height: auto; border-radius: 12px; border: 1px solid #eef2f6; display: block; }
  </style>
</head>
<body>
  <h1>Phingo — latest UI screens</h1>
  <p>Captured from Expo web (2026-05-27)</p>
  <div class="grid">
    <figure><figcaption>Home</figcaption><img src="./01-home.png" alt="Home" loading="lazy" /></figure>
    <figure><figcaption>Games hub</figcaption><img src="./02-games.png" alt="Games hub" loading="lazy" /></figure>
    <figure><figcaption>AI Teacher</figcaption><img src="./03-ai-teacher.png" alt="AI Teacher" loading="lazy" /></figure>
    <figure><figcaption>AI Role Play</figcaption><img src="./04-roleplay-picker.png" alt="AI Role Play" loading="lazy" /></figure>
    <figure><figcaption>Street path</figcaption><img src="./05-dashboard-street.png" alt="Street path" loading="lazy" /></figure>
    <figure><figcaption>Normal path</figcaption><img src="./06-dashboard-normal.png" alt="Normal path" loading="lazy" /></figure>
  </div>
</body>
</html>
