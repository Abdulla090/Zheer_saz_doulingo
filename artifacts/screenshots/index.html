<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phingo UI Screenshots — latest</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 24px; background: #f4f9ff; color: #1a2b48; }
    h1 { font-size: 1.6rem; margin: 0 0 6px; }
    h2 { font-size: 1rem; margin: 28px 0 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; }
    p { margin: 0 0 20px; color: #64748b; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }
    figure { margin: 0; background: #fff; border-radius: 16px; padding: 12px; box-shadow: 0 8px 28px rgba(26,43,72,.09); }
    figcaption { font-weight: 700; margin-bottom: 10px; font-size: 14px; }
    img { width: 100%; height: auto; border-radius: 12px; border: 1px solid #eef2f6; display: block; }
  </style>
</head>
<body>
  <h1>Phingo — latest UI (May 2026)</h1>
  <p>Games hub, AI Role Play redesign, AI Teacher, home & learning paths.</p>

  <h2>Main app</h2>
  <div class="grid">
    <figure><figcaption>Home</figcaption><img src="./01-home.png" alt="Home" /></figure>
    <figure><figcaption>Games hub (3D tiles)</figcaption><img src="./02-games.png" alt="Games" /></figure>
    <figure><figcaption>AI Teacher</figcaption><img src="./03-ai-teacher.png" alt="AI Teacher" /></figure>
    <figure><figcaption>AI Role Play</figcaption><img src="./04-roleplay-picker.png" alt="Role Play" /></figure>
    <figure><figcaption>Street English path</figcaption><img src="./05-dashboard-street.png" alt="Street path" /></figure>
    <figure><figcaption>Normal English path</figcaption><img src="./06-dashboard-normal.png" alt="Normal path" /></figure>
  </div>

  <h2>Lesson games</h2>
  <div class="grid">
    <figure><figcaption>Order words</figcaption><img src="./lesson-order-words.png" alt="Order words" /></figure>
    <figure><figcaption>Pair words</figcaption><img src="./lesson-pair-words.png" alt="Pair words" /></figure>
    <figure><figcaption>Multiple choice</figcaption><img src="./lesson-multiple-choice.png" alt="Multiple choice" /></figure>
  </div>
</body>
</html>
